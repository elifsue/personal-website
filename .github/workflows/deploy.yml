name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # Runs on every push to main
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build
        env:
          NODE_ENV: production
          # Vite env vars required at build time (safe public values)
          VITE_ANALYTICS_ENDPOINT: ""
          VITE_ANALYTICS_WEBSITE_ID: ""
          VITE_APP_ID: ""
          VITE_APP_LOGO: ""
          VITE_APP_TITLE: "Elifsu Ates — UI/UX Designer"
          VITE_FRONTEND_FORGE_API_KEY: ""
          VITE_FRONTEND_FORGE_API_URL: ""
          VITE_OAUTH_PORTAL_URL: ""

      - name: Copy 404.html for SPA routing fallback
        run: cp dist/public/index.html dist/public/404.html

      - name: Verify photo asset exists in build
        run: ls dist/public/elifsu_ates.webp

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public   # Vite outputs to dist/public per vite.config.ts

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
