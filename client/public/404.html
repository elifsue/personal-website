<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Elifsu Ateş — UI/UX Designer</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages serves a 404 for a deep link or a refresh,
      // this page encodes the full path into the query string and
      // redirects to the repo root so index.html can handle it.
      var segmentCount = 1; // number of path segments in the repo name (1 for /personal-website)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
