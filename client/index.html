    <!-- GitHub Pages SPA redirect: decode path encoded by 404.html -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= query param approach
        var search = window.location.search;
        if (search && search.indexOf('?p=') === 0) {
          var decoded = search.slice(3).replace(/~and~/g, '&');
          var path = window.location.pathname.replace(/\/$/, '') + '/' + decoded;
          history.replaceState(null, null, path + (window.location.hash || ''));
        }
      })();
    </script>
